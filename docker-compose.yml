services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: portfolio_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    ports:
      - "3001:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: mysql://user:password@db:3306/portfolio_db
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  db_data:
